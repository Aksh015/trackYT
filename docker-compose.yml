version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: trackyt-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  redisinsight:
    image: redis/redisinsight:latest
    container_name: trackyt-redisinsight
    ports:
      - "8001:5540"
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  redis_data:
